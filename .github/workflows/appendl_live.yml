name: Append Live Observations

# activate scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

concurrency:
  group: append-live
  cancel-in-progress: false

jobs:
  append_live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install pandas pyarrow selenium

      - name: Run live updater
        run: |
          python code/02_append_live.py

      - name: Commit parquet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/dashboard/observations.parquet

          git diff --cached --quiet && exit 0

          git commit -m "append live observations"

          git pull --rebase origin main
          git push origin main
