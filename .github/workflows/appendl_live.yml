name: Append Live Observations

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  append_live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install pandas pyarrow selenium

      - name: Run live updater
        run: |
          python code/02_append_live.py

      - name: Commit parquet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/dashboard/observations.parquet
          git diff --cached --quiet || git commit -m "append live observations"
          git push
