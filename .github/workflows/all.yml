name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: weather-pipeline
  cancel-in-progress: false

jobs:
  weather_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Skip if another run is already in progress
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          workflow = os.environ["WORKFLOW"]
          token = os.environ["GH_TOKEN"]

          url = f"https://api.github.com/repos/{repo}/actions/runs?status=in_progress&per_page=100"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          current_id = int(run_id)

          others = []
          for run in data.get("workflow_runs", []):
              if run.get("name") != workflow:
                  continue
              rid = int(run["id"])
              if rid == current_id:
                  continue
              others.append(rid)

          if others:
              print(f"Another run is already in progress for '{workflow}': {others}")
              print("Exiting this run cleanly.")
              sys.exit(0)

          print("No other in-progress run found.")
          PY

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git pull --rebase origin main

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests beautifulsoup4 selenium webdriver-manager scikit-learn joblib
          pip install herbie-data xarray cfgrib eccodes
          python -m eccodes selfcheck
          python -m cfgrib selfcheck

      - name: Append live observations
        run: |
          python code/02_append_live.py

      - name: Run model pipeline
        run: |
          python code/05_build_observations_model_and_score.py

      - name: Build forecast
        run: |
          python code/03_forecast.py

      - name: Commit updated outputs
        run: |
          git add data/dashboard/observations.parquet || true
          git add data/dashboard/observations_model.parquet || true
          git add data/dashboard/forecast_model.parquet || true
          git add data/dashboard/forecast_latest.parquet || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update weather pipeline outputs"
          git push origin main
