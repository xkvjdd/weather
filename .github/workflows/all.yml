name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0,10,20,30,40,50 * * * *"

permissions:
  contents: write

concurrency:
  group: weather-pipeline
  cancel-in-progress: false

jobs:
  weather_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git pull --rebase origin main

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests beautifulsoup4 selenium webdriver-manager scikit-learn joblib

      - name: Append live observations
        run: |
          python code/02_append_live.py

      - name: Run model pipeline
        run: |
          python code/05_build_observations_model_and_score.py

      - name: Build forecast
        run: |
          python code/03_forecast.py

      - name: Commit updated outputs
        run: |
          git add data/dashboard/observations.parquet || true
          git add data/dashboard/observations_model.parquet || true
          git add data/dashboard/forecast_model.parquet || true
          git add data/dashboard/forecast_latest.parquet || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update weather pipeline outputs"
          git push origin main
