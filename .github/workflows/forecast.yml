name: Build Forecast Latest

on:
  schedule:
    - cron: "8,18,28,38,48,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-forecast-latest
  cancel-in-progress: false

jobs:
  build-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git pull --rebase origin main

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests beautifulsoup4 selenium

      - name: Run forecast builder
        run: |
          python code/03_forecast.py

      - name: Commit updated forecast parquet
        run: |
          git add data/dashboard/forecast_latest.parquet || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update forecast_latest"
          git push origin main
