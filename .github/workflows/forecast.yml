name: Build Forecast Latest

on:
  schedule:
    - cron: "*/15 * * * *"   # run every 30 minutes
  workflow_dispatch:          # allow manual run

jobs:
  build-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests

      - name: Run forecast builder
        run: |
          python code/03_forecast.py

      - name: Commit updated forecast parquet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/dashboard/forecast_latest.parquet || true

          git diff --cached --quiet || git commit -m "update forecast_latest"

          git push
