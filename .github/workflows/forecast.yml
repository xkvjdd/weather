name: Build Forecast Latest
on:
  schedule:
    - cron: "8,18,28,38,48,58 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests beautifulsoup4 selenium webdriver-manager
      - name: Run forecast builder
        run: |
          python code/03_forecast.py
      - name: Commit updated forecast parquet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/dashboard/forecast_latest.parquet || true
          git diff --cached --quiet || git commit -m "update forecast_latest"
          git pull --rebase origin main
          git push
